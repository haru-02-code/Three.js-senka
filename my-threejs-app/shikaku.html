<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>はじめての3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <!-- 公式サイトからthree.jsライブラリ持ってきている -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
    <script>
        

        // シーンの作成
        const scene = new THREE.Scene();

        // カメラの作成
        const camera = new THREE.PerspectiveCamera(100, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5; // カメラの位置を設定 z軸方向に5ユニット離す
        camera.position.y = 2;
        camera.lookAt(new THREE.Vector3(0, 0, 0));
        // レンダラーの作成
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas') });
        renderer.setSize(window.innerWidth, window.innerHeight);
        // 背景色変更
        renderer.setClearColor(0xffffff);

        // テクスチャ
        const loader = new THREE.TextureLoader();
        const tex = loader.load('public/kuro.png')
        tex.colorSpace = THREE.SRGBColorSpace;

        const tex2 = loader.load('public/Leather.png')
        tex2.colorSpace = THREE.SRGBColorSpace;
 
        const kuromaterial = new THREE.MeshStandardMaterial({
            map: tex,
            roughness: 0.1,
            metalness: 0.6
        })

        const tex3 = loader.load('public/Tiles.png')
        tex3.colorSpace = THREE.SRGBColorSpace;

        tex3.wrapS = THREE.RepeatWrapping;
        tex3.wrapT = THREE.RepeatWrapping;
        tex3.repeat.set(4, 4); // 4×4 タイル

        const woodmaterial = new THREE.MeshStandardMaterial({
            map: tex3,
            roughness: 0.6,
            metalness: 0.6
        })

        scene.background = tex2

        tex2.wrapS = THREE.RepeatWrapping;
        tex2.wrapT = THREE.RepeatWrapping;
        tex2.repeat.set(6, 3);

        // ジオメトリとマテリアルの作成
        // イチゴ
        const geometry = new THREE.TorusKnotGeometry();
        const material = new THREE.MeshStandardMaterial({
            color: 0xffd1dc,
            // 表面の粗さ
            roughness: 0,
            // 金属らしさ
            metalness: 0,
        });
        const cube = new THREE.Mesh(geometry, kuromaterial);
        scene.add(cube);

        // みたらし
        const geometry1 = new THREE.SphereGeometry();
        const material1 = new THREE.MeshStandardMaterial({
            color: 0xcda16f,
            // 表面の粗さ
            roughness: 0,
            // 金属らしさ
            metalness: 0.5,
        });
        const cube1 = new THREE.Mesh(geometry1, kuromaterial);
        cube1.position.x = 3
        scene.add(cube1);

        // きなこ
        const geometry2 = new THREE.DodecahedronGeometry();
        const material2 = new THREE.MeshStandardMaterial({
            color: 0xc29b53,
            // 表面の粗さ
            roughness: 0.5,
            // 金属らしさ
            metalness: 0,
        });
        const cube2 = new THREE.Mesh(geometry2, kuromaterial);
        cube2.position.x = -3
        scene.add(cube2);

        // 床の作成
        // meshはgeometryとmaterial
        const floor = new THREE.Mesh(
            // PlaneGeometry 平面（床・壁）
            new THREE.PlaneGeometry(20, 20),
            woodmaterial
        )
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -5
        scene.add(floor)

        // ライト
        const light = new THREE.DirectionalLight(0xffffff, 1.0);
        light.position.set(3, 10, 0);
        scene.add(light);

        // 影
        renderer.shadowMap.enabled = true;
        light.castShadow = true
        cube.castShadow = true
        cube1.castShadow = true
        cube2.castShadow = true
        floor.receiveShadow = true

        

        // 3Dモデル読み込み用インポート
        // const OBJLoader = new THREE.OBJLoader();
        // OBJLoader.load(
        //     'Cat.obj',
        //     function(obj) {
        //         scene.add(obj);
        //     },
        // );

        // アニメーションループ
        function animate() {
            requestAnimationFrame(animate);
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;
            cube1.rotation.x += 0.03;
            cube1.rotation.y += 0.03;
            cube2.rotation.x += 0.03;
            cube2.rotation.y += 0.03;

            // 上下移動
            let sin = Math.sin(Date.now() * 0.001) * 0.7
            cube.position.y = sin * 5
            cube1.position.y = sin
            cube2.position.y = sin



            renderer.render(scene, camera);
        }
        animate();
    </script>

    
</body>
</html>
